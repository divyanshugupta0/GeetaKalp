    font-size: 20px

    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.5)
    }

    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuBZngXBBQ13lnELI8uwxMWIVn3ITPOpOTOiV2b78YdJtcMtVuh9A6ldwPyba96aPQVU9eGCYRtngwgC-nNOrW4zOtZ4mjCWhvSedEBy6p_wB0g3_59eA9EJI411DgxoIx1zyuJU7N3B2uKIt5N0G2frKhtClNgwBgVWh1gjiTdOXKU6ZnKaDo7GJko6b3Iqv-XzQfsHIdC58ZZcjSTY_u6r8ZVZwRnfWpbZMLQ5hX_2x8l1KmpLZuLBgCXTL5lujw8deS3Sz6q4jyM);

<body class="bg-background-light font-body-md text-on-surface overflow-hidden">
<!-- Transactional Screen: Navigation and FAB are suppressed per "The Destination Rule" and "Contextual FAB Suppression" -->
<!-- Main Identity Canvas -->
<main class="relative h-screen w-full flex items-center justify-center bg-ethereal-blur px-container-padding" data-alt="A serene and ethereal botanical background featuring soft-focus sage green leaves and delicate white flora. The lighting is high-key and misty, creating a weightless, dreamy atmosphere characteristic of a premium wellness brand. Subtle light leaks dance across the composition, enhancing the feeling of a morning ritual in a glass-walled apothecary. The colors are predominantly muted greens, creams, and whites.">
<!-- Depth Layer: Tonal Overlay (Level 1) -->
<div class="absolute inset-0 bg-[#11211533] backdrop-blur-[4px]"></div>
<!-- Glassmorphic Modal (Level 2 Surface) -->
<section class="glass-panel w-full max-w-[400px] rounded-xl p-10 flex flex-col items-center shadow-sm relative z-10">
<!-- Logo Section -->
<div class="mb-stack-gap text-center">
<span class="font-display-md text-display-md text-primary italic tracking-tight">Organic Ethereal</span>
</div>
<!-- Title -->
<h1 class="font-display-lg text-display-lg text-on-surface text-center mb-element-gap leading-tight">
                Welcome Back to the Sanctuary
            </h1>
<p class="font-label-sm text-label-sm text-on-surface-variant/70 text-center uppercase tracking-widest mb-stack-gap">
                Step into your ritual
            </p>
<!-- Authentication Form -->
<form class="w-full flex flex-col gap-6">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-secondary/80 ml-2" for="email">Email Address</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-secondary/40">mail</span>
<input class="w-full bg-white/40 border border-primary/10 rounded-full py-4 pl-12 pr-6 font-body-md text-on-surface placeholder:text-on-surface-variant/30 focus:outline-none focus:ring-1 focus:ring-primary/30 transition-all duration-300" id="email" placeholder="your@email.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-secondary/80 ml-2" for="password">Password</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-secondary/40">lock</span>
<input class="w-full bg-white/40 border border-primary/10 rounded-full py-4 pl-12 pr-6 font-body-md text-on-surface placeholder:text-on-surface-variant/30 focus:outline-none focus:ring-1 focus:ring-primary/30 transition-all duration-300" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end -mt-2">
<a class="font-label-sm text-label-sm text-on-surface-variant/50 hover:text-primary transition-colors duration-300 italic" href="#">Forgotten your path?</a>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary font-label-caps text-label-caps uppercase tracking-[0.2em] py-5 rounded-full hover:bg-primary-container transition-all duration-500 shadow-sm active:scale-[0.98]" type="submit">
                    Enter Sanctuary
                </button>
</form>
<!-- Secondary Actions -->
<div class="mt-stack-gap flex flex-col items-center gap-4">
<div class="flex items-center gap-2 w-full px-4">
<div class="h-[1px] flex-grow bg-divider"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant/30">OR</span>
<div class="h-[1px] flex-grow bg-divider"></div>
</div>
<a class="font-label-caps text-label-caps text-secondary hover:text-primary transition-colors duration-300 flex items-center gap-2" href="#">
                    Create an Account
                    <span class="material-symbols-outlined">arrow_forward</span>
</a>
</div>
</section>
<!-- Aesthetic Flourish: Floating Botanical elements (Blurred Images) -->
<div class="absolute -bottom-20 -left-20 w-80 h-80 opacity-40 mix-blend-multiply filter blur-3xl rounded-full bg-primary/10"></div>
<div class="absolute top-20 -right-20 w-64 h-64 opacity-30 mix-blend-multiply filter blur-3xl rounded-full bg-secondary-fixed"></div>
</main>
<!-- Footer Segment (Minimalist Copyright) -->
<footer class="fixed bottom-6 w-full text-center z-20">
<p class="font-label-sm text-label-sm text-on-surface-variant/40 tracking-[0.2em] uppercase">
            © 2024 Organic Ethereal. Crafted for Ritual.
        </p>
</footer>
</body></html>
